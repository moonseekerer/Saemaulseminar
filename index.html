<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>새마을세미나 과제 포털</title>
    <meta name="description" content="새마을세미나 과제 메인 포털입니다.">
    <link href="https://fonts.googleapis.com/css2?family=Pretendard:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #0f172a;
            --text-color: #f8fafc;
            --text-secondary: #94a3b8;
            --accent-blue: #3b82f6;
            --accent-hover: #2563eb;
            --card-bg: rgba(30, 41, 59, 0.7);
            --card-border: rgba(255, 255, 255, 0.1);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Pretendard', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 4rem 2rem;
            background-image: 
                radial-gradient(at 0% 0%, rgba(59, 130, 246, 0.15) 0px, transparent 50%),
                radial-gradient(at 100% 100%, rgba(168, 85, 247, 0.15) 0px, transparent 50%);
            background-attachment: fixed;
        }

        header {
            text-align: center;
            margin-bottom: 4rem;
        }

        h1 {
            font-size: 2.8rem;
            font-weight: 700;
            margin-bottom: 1rem;
            background: linear-gradient(to right, #60a5fa, #a855f7);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .subtitle {
            font-size: 1.2rem;
            color: var(--text-secondary);
        }

        .grid-container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 2rem;
            width: 100%;
            max-width: 900px;
        }

        .card {
            background: var(--card-bg);
            border: 1px solid var(--card-border);
            border-radius: 16px;
            padding: 2rem;
            text-decoration: none;
            color: var(--text-color);
            transition: all 0.3s ease;
            display: flex;
            flex-direction: column;
            height: 100%;
            position: relative;
            overflow: hidden;
            backdrop-filter: blur(10px);
        }

        .card::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0; height: 4px;
            background: linear-gradient(90deg, transparent, transparent);
            transition: all 0.3s ease;
        }

        .card:hover {
            transform: translateY(-5px);
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.3);
            border-color: rgba(255,255,255,0.2);
        }

        .card:hover::before {
            background: linear-gradient(90deg, var(--accent-blue), #a855f7);
        }

        .chapter-badge {
            background: rgba(255,255,255,0.1);
            color: #e2e8f0;
            padding: 0.4rem 0.8rem;
            border-radius: 20px;
            font-size: 0.85rem;
            font-weight: 600;
            align-self: flex-start;
            margin-bottom: 1.5rem;
            border: 1px solid rgba(255,255,255,0.05);
        }

        .card-title {
            font-size: 1.5rem;
            font-weight: 700;
            margin-bottom: 1rem;
            line-height: 1.4;
        }

        .card-desc {
            color: var(--text-secondary);
            font-size: 1rem;
            line-height: 1.6;
            margin-bottom: 2rem;
            flex-grow: 1;
        }

        .card-footer {
            display: flex;
            align-items: center;
            justify-content: space-between;
            font-weight: 600;
            color: var(--accent-blue);
        }

        .card-footer span {
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .arrow {
            transition: transform 0.3s ease;
        }

        .card:hover .arrow {
            transform: translateX(5px);
        }

        /* 5장 전용 스타일 (예시) */
        .card.ch5 .chapter-badge {
            background: rgba(168, 85, 247, 0.15);
            color: #d8b4fe;
            border-color: rgba(168, 85, 247, 0.3);
        }
        
        .card.ch5:hover::before {
            background: linear-gradient(90deg, #a855f7, #f472b6);
        }

    </style>
</head>
<body>

    <header>
        <h1>새마을세미나 과제 포털</h1>
        <p class="subtitle">열람하실 과제의 챕터를 선택해 주세요.</p>
    </header>

    <div class="grid-container">
        
        <!-- 제5장 (준비 중 혹은 다른 파일 연결용) -->
        <a href="chapter5/index.html" class="card ch5" id="ch5-link">
            <div class="chapter-badge">제 5장</div>
            <div class="card-title">PPT 발표 자료<br>(준비 중)</div>
            <div class="card-desc">
                제5장 내용에 관한 PPT 발표 자료 또는 관련 과제물이 위치할 공간입니다.<br><br>
                <small>* 아직 파일이 연결되지 않았다면 클릭 시 오류가 날 수 있습니다.</small>
            </div>
            <div class="card-footer">
                <span>자세히 보기 <span class="arrow">→</span></span>
            </div>
        </a>

        <!-- 제6장 (시뮬레이터) -->
        <a href="chapter6/index.html" class="card">
            <div class="chapter-badge">제 6장</div>
            <div class="card-title">죄수의 딜레마 &amp;<br>맞대응전략 시뮬레이터</div>
            <div class="card-desc">
                제6장 마을간 경쟁, 차등적 지원, 그리고 협력.<br>
                정부의 맞대응전략(Tit-for-Tat)을 이해할 수 있는 다크모드 인터랙티브 시뮬레이터를 체험해 보세요.
            </div>
            <div class="card-footer">
                <span>시뮬레이터 실행하기 <span class="arrow">→</span></span>
            </div>
        </a>

    </div>

    <script>
        // 만약 chapter5/index.html 이 없다면 사용자에게 알림
        document.getElementById('ch5-link').addEventListener('click', function(e) {
            // e.preventDefault(); // 만약 아직 링크 이동을 막고 싶다면 주석 해제
            // alert('제5장 자료는 아직 업로드되지 않았거나 폴더 위치를 연결해야 합니다.');
        });
    </script>
</body>
</html>
