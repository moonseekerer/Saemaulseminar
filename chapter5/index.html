<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>전망이론과 마인드셋의 변화 효과</title>
    <meta name="description" content="새마을운동과 행동경제학의 전망이론을 통한 마인드셋의 변화 효과 알아보기">
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Pretendard:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <!-- ECharts -->
    <script src="https://cdn.jsdelivr.net/npm/echarts@5.5.0/dist/echarts.min.js"></script>
    
    <!-- KaTeX -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.css">
    <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.js"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/contrib/auto-render.min.js"></script>
</head>
<body>
    <a href="../index.html" style="position:fixed; top:20px; left:20px; color:#fff; text-decoration:none; padding:10px 15px; background:rgba(255,255,255,0.1); border-radius:8px; z-index:1000; border:1px solid rgba(255,255,255,0.2); backdrop-filter:blur(5px); font-size:0.9rem;">← 메인으로</a>
    <div class="app-container">
        <!-- Background Animation -->
        <div class="bg-shape circle-1"></div>
        <div class="bg-shape circle-2"></div>
        <div class="bg-shape circle-3"></div>

        <main id="slider-container">
            <!-- Pages will be dynamically injected here via JS -->
        </main>
        
        <div class="controls">
            <button id="prev-btn" class="nav-btn" disabled aria-label="이전 페이지">
                <i class="bi bi-chevron-left"></i>
            </button>
            <div class="pagination-indicators" id="indicators">
                <!-- Dots injected via JS -->
            </div>
            <button id="next-btn" class="nav-btn" aria-label="다음 페이지">
                <i class="bi bi-chevron-right"></i>
            </button>
            <button id="download-pdf" class="nav-btn download-btn" title="PDF로 다운로드">
                <i class="bi bi-file-earmark-pdf"></i>
            </button>
        </div>
    </div>

    <!-- PDF Generation Library -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <script src="app.js"></script>
</body>
</html>
